<div
  style="
    max-width: 600px;
    margin: 30px auto;
    border: 1px solid #ccc;
    padding: 20px;
  "
>
  <h2>Pulse Global Chat</h2>

  <div
    style="
      height: 300px;
      overflow-y: auto;
      border: 1px solid #eee;
      margin-bottom: 20px;
      padding: 10px;
    "
  >
    @for (msg of messages(); track $index) {
      <div
        style="
          margin-bottom: 10px;
          padding: 8px;
          background: #f0f0f0;
          border-radius: 4px;
        "
      >
        {{ msg.text }}
      </div>
    } @empty {
      <p style="color: gray">No messages yet. Say hi!</p>
    }
  </div>

  <form
    [formGroup]="chatForm"
    (ngSubmit)="sendMessage()"
    style="display: flex; gap: 10px"
  >
    <input
      type="text"
      formControlName="messageText"
      placeholder="Type a message..."
      style="flex-grow: 1; padding: 8px"
    />
    <button type="submit" [disabled]="chatForm.invalid">Send</button>
  </form>
</div>
